name: Lint and Test Charts

on:
  pull_request:
    paths:
      - 'charts/**'
      - 'ct.yaml'
      - '.github/workflows/lint-test.yaml'

# Linting and testing only need to read the repository.
permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.21.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # chart-testing bundles a yamale version that relies on ast.Num,
          # which was removed in Python 3.12. Pin to 3.11 so `ct lint` works.
          python-version: '3.11'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.14.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        # helm-unittest v1.1.x uses the `platformHooks` plugin field, which
        # requires Helm >= 3.18; keep this pin at 3.18+ to load the plugin.
        uses: azure/setup-helm@v5
        with:
          version: v3.21.2

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1

      - name: Run helm unit tests
        run: |
          set -euo pipefail
          ran=0
          for chart in charts/*/; do
            if [ -d "${chart}tests" ]; then
              echo "::group::unittest ${chart}"
              helm unittest "$chart"
              echo "::endgroup::"
              ran=1
            fi
          done
          if [ "$ran" -eq 0 ]; then
            echo "No chart unit tests found."
          fi
