version: 2
updates:
  # Keep the GitHub Actions used by our workflows up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
