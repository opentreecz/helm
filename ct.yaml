# Configuration for chart-testing (ct)
# https://github.com/helm/chart-testing
remote: origin
target-branch: main
chart-dirs:
  - charts
helm-extra-args: --timeout 600s
# Versioning is handled automatically by the release workflow (auto-bump),
# so we don't force contributors to bump the chart version in their PRs.
check-version-increment: false
validate-maintainers: false
